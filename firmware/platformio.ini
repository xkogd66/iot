; PlatformIO Project Configuration File
; MXChip AZ3166 home telemetry firmware
; Docs: https://docs.platformio.org/page/projectconf.html

[env:mxchip_az3166]
platform = ststm32
board = mxchip_az3166
framework = arduino

; Flashing: the AZ3166's onboard probe is a genuine ST-Link/V2-1, but the
; stock `stlink` protocol forces hla_swd (rejected) and the image must land at
; 0x0800C000 (after the bootloader). We drive OpenOCD ourselves via flash.sh.
; See flash.sh header for the full story. `pio run -t upload` uses it too:
upload_protocol = custom
upload_command = $PROJECT_DIR/flash.sh

; Serial monitor for sensor/debug output
monitor_speed = 115200

; -u _printf_float: pull in newlib float formatting so snprintf("%f") works
; (newlib-nano omits it by default -> floats would print as blank/garbage)
build_flags =
    -Wl,-u,_printf_float

# Grafana provisioning, mounted read-only into the pod:
#   grafana-datasources        -> /etc/grafana/provisioning/datasources
#   grafana-dashboard-provider -> /etc/grafana/provisioning/dashboards
#   grafana-dashboard-telemetry-> /var/lib/grafana/dashboards/iot
# Grafana here is a rendering engine: the dashboard app at 192.168.1.217 embeds
# individual panels via /d-solo/ iframes, which is why the Deployment turns on
# anonymous viewing and embedding.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: iot
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: InfluxDB
        uid: influxdb
        type: influxdb
        access: proxy
        url: http://influxdb.iot.svc.cluster.local:8086
        isDefault: true
        editable: true
        jsonData:
          # Without version: Flux, Grafana speaks InfluxQL, which cannot see a
          # 2.x bucket without DBRP mappings.
          version: Flux
          organization: iot
          defaultBucket: iot-data
          httpMode: POST
        secureJsonData:
          # Interpolated from the INFLUX_TOKEN env var (see deployment.yaml),
          # sourced from the same influxdb-auth secret Telegraf uses.
          token: $INFLUX_TOKEN
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: iot
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: iot
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/iot
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-telemetry
  namespace: iot
data:
  # uid and panel ids are load-bearing — the dashboard app's iframe URLs
  # reference them directly. Don't renumber panels.
  telemetry.json: |
    {
      "uid": "iot-telemetry",
      "title": "Telemetry",
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "1m",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "site",
            "label": "Site",
            "type": "query",
            "datasource": { "type": "influxdb", "uid": "influxdb" },
            "query": "import \"influxdata/influxdb/schema\"\nschema.tagValues(bucket: \"iot-data\", tag: \"site\")",
            "refresh": 1,
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Temperature",
          "type": "timeseries",
          "datasource": { "type": "influxdb", "uid": "influxdb" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "celsius", "custom": { "lineWidth": 2, "fillOpacity": 5 } },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"iot-data\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"telemetry\" and r.site == \"${site}\" and r._field == \"temp\")\n  |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)\n  |> keep(columns: [\"_time\", \"_value\", \"room\"])"
            }
          ]
        },
        {
          "id": 2,
          "title": "Humidity",
          "type": "timeseries",
          "datasource": { "type": "influxdb", "uid": "influxdb" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "humidity", "custom": { "lineWidth": 2, "fillOpacity": 5 } },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"iot-data\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"telemetry\" and r.site == \"${site}\" and r._field == \"humidity\")\n  |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)\n  |> keep(columns: [\"_time\", \"_value\", \"room\"])"
            }
          ]
        },
        {
          "id": 3,
          "title": "Pressure",
          "type": "timeseries",
          "datasource": { "type": "influxdb", "uid": "influxdb" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "pressurehpa", "custom": { "lineWidth": 2, "fillOpacity": 5 } },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"iot-data\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"telemetry\" and r.site == \"${site}\" and r._field == \"pressure\")\n  |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)\n  |> keep(columns: [\"_time\", \"_value\", \"room\"])"
            }
          ]
        }
      ]
    }

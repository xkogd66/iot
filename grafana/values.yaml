# Helm values for the grafana chart (grafana/grafana).
#
#   helm upgrade --install grafana grafana/grafana -n iot -f grafana/values.yaml
#
# Grafana here is a rendering engine, not a destination: the dashboard app at
# 192.168.1.217 embeds individual panels from it via /d-solo/ iframes. That is
# why anonymous viewing and embedding are enabled below.

adminUser: admin
adminPassword: admin

replicas: 1

service:
  enabled: true
  type: LoadBalancer
  port: 80
  portName: http
  targetPort: 3000

persistence:
  enabled: true
  size: 5Gi
  storageClassName: local-path

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# InfluxDB's token, pulled from the same secret Telegraf and the dashboard use.
# Referenced as $INFLUX_TOKEN in the datasource below.
envValueFrom:
  INFLUX_TOKEN:
    secretKeyRef:
      name: influxdb-auth
      key: admin-token

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: InfluxDB
        uid: influxdb
        type: influxdb
        access: proxy
        url: http://influxdb.iot.svc.cluster.local:8086
        isDefault: true
        editable: true
        jsonData:
          # Without version: Flux, Grafana speaks InfluxQL, which cannot see a
          # 2.x bucket without DBRP mappings.
          version: Flux
          organization: iot
          defaultBucket: iot-data
          httpMode: POST
        secureJsonData:
          token: $INFLUX_TOKEN

grafana.ini:
  server:
    root_url: http://192.168.1.218
  auth:
    disable_login_form: false
  # Required for /d-solo/ iframes: Grafana sends X-Frame-Options: deny otherwise,
  # and an anonymous iframe would render a login form instead of a panel.
  security:
    allow_embedding: true
  auth.anonymous:
    enabled: true
    org_role: Viewer

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: iot
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/iot

dashboards:
  iot:
    telemetry:
      # uid and panel ids are load-bearing — the dashboard app's iframe URLs
      # reference them directly. Don't renumber panels.
      json: |
        {
          "uid": "iot-telemetry",
          "title": "Telemetry",
          "timezone": "browser",
          "schemaVersion": 39,
          "refresh": "1m",
          "time": { "from": "now-6h", "to": "now" },
          "templating": {
            "list": [
              {
                "name": "site",
                "label": "Site",
                "type": "query",
                "datasource": { "type": "influxdb", "uid": "influxdb" },
                "query": "import \"influxdata/influxdb/schema\"\nschema.tagValues(bucket: \"iot-data\", tag: \"site\")",
                "refresh": 1,
                "includeAll": false,
                "multi": false
              }
            ]
          },
          "panels": [
            {
              "id": 1,
              "title": "Temperature",
              "type": "timeseries",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
              "fieldConfig": {
                "defaults": { "unit": "celsius", "custom": { "lineWidth": 2, "fillOpacity": 5 } },
                "overrides": []
              },
              "targets": [
                {
                  "refId": "A",
                  "datasource": { "type": "influxdb", "uid": "influxdb" },
                  "query": "from(bucket: \"iot-data\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"telemetry\" and r.site == \"${site}\" and r._field == \"temp\")\n  |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)\n  |> keep(columns: [\"_time\", \"_value\", \"room\"])"
                }
              ]
            },
            {
              "id": 2,
              "title": "Humidity",
              "type": "timeseries",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
              "fieldConfig": {
                "defaults": { "unit": "humidity", "custom": { "lineWidth": 2, "fillOpacity": 5 } },
                "overrides": []
              },
              "targets": [
                {
                  "refId": "A",
                  "datasource": { "type": "influxdb", "uid": "influxdb" },
                  "query": "from(bucket: \"iot-data\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"telemetry\" and r.site == \"${site}\" and r._field == \"humidity\")\n  |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)\n  |> keep(columns: [\"_time\", \"_value\", \"room\"])"
                }
              ]
            },
            {
              "id": 3,
              "title": "Pressure",
              "type": "timeseries",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
              "fieldConfig": {
                "defaults": { "unit": "pressurehpa", "custom": { "lineWidth": 2, "fillOpacity": 5 } },
                "overrides": []
              },
              "targets": [
                {
                  "refId": "A",
                  "datasource": { "type": "influxdb", "uid": "influxdb" },
                  "query": "from(bucket: \"iot-data\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"telemetry\" and r.site == \"${site}\" and r._field == \"pressure\")\n  |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)\n  |> keep(columns: [\"_time\", \"_value\", \"room\"])"
                }
              ]
            }
          ]
        }

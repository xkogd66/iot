apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegraf
  namespace: iot
  labels:
    app: telegraf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegraf
  template:
    metadata:
      labels:
        app: telegraf
    spec:
      containers:
      - name: telegraf
        image: telegraf:1.30-alpine
        env:
        - name: INFLUX_TOKEN
          valueFrom:
            secretKeyRef:
              name: influxdb-auth
              key: admin-token
        - name: INFLUX_ORG
          valueFrom:
            secretKeyRef:
              name: influxdb-auth
              key: org
        - name: INFLUX_BUCKET
          valueFrom:
            secretKeyRef:
              name: influxdb-auth
              key: bucket
        volumeMounts:
        - name: config
          mountPath: /etc/telegraf/telegraf.conf
          subPath: telegraf.conf
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: telegraf-config

name: Deploy dashboard

on:
  push:
    branches: [ main ]
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/iot-dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.CR_PAT_USERNAME || github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Export IMAGE_TAG
        run: echo "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Set up KUBECONFIG
        run: |
          printf '%s' "${{ secrets.KUBECONFIG_FILE_CONTENT }}" > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Kubeconfig sanity check
        run: |
          if [ ! -s kubeconfig.yaml ]; then echo "kubeconfig missing or empty" >&2; exit 1; fi
          SERVER=$(kubectl config view --raw -o jsonpath="{.clusters[0].cluster.server}" 2>/dev/null || true)
          echo "Cluster server: $SERVER"
          if [ -z "$SERVER" ]; then echo "unable to read server from kubeconfig" >&2; exit 1; fi
          if [[ "$SERVER" == *localhost* ]]; then echo "kubeconfig points to localhost; the runner cannot reach it" >&2; exit 1; fi

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying image: $IMAGE_TAG"
          sed -E "s|image: ghcr.io/[^[:space:]]*/iot-dashboard:.*|image: ${IMAGE_TAG}|" \
            dashboard/deployment.yaml | kubectl apply -f -
          kubectl apply -f dashboard/service.yaml
          kubectl rollout status deployment/dashboard --namespace=iot --timeout=300s

      - name: Debug on failure
        if: failure()
        run: |
          echo "Deployment failed. Gathering debug information..."
          kubectl describe deployment dashboard --namespace=iot
          kubectl describe pods -l app=dashboard --namespace=iot
          kubectl logs -l app=dashboard --namespace=iot --tail=50

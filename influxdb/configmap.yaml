apiVersion: v1
kind: ConfigMap
metadata:
  name: influxdb-config
  namespace: iot
data:
  influxdb.conf: |
    [http]
      bind-address = ":8086"
      auth-enabled = true

    [meta]
      dir = "/var/lib/influxdb2/meta"

    [data]
      dir = "/var/lib/influxdb2/data"
      wal-dir = "/var/lib/influxdb2/wal"
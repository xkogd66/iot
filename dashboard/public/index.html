<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IoT telemetry</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font: 16px/1.5 system-ui, -apple-system, sans-serif;
      max-width: 40rem; margin: 0 auto; padding: 2rem 1rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 1.5rem; }
    select { font: inherit; padding: .4rem .5rem; }
    .cards {
      display: grid; gap: 1rem; margin-top: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
    }
    .card {
      border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
      border-radius: .5rem; padding: 1rem;
    }
    .label { font-size: .8rem; opacity: .7; }
    .value { font-size: 2rem; font-variant-numeric: tabular-nums; }
    .unit { font-size: 1rem; opacity: .6; }
    .note { margin-top: 1.5rem; font-size: .8rem; opacity: .6; }
    .error { color: #c00; }
    .status {
      margin-top: 1rem; font-size: .9rem;
      display: inline-flex; align-items: center; gap: .5rem;
    }
    .status::before {
      content: ""; width: .6rem; height: .6rem; border-radius: 50%;
      background: #9ca3af;
    }
    .status.up::before { background: #22c55e; }
    .status.down { color: #ef4444; }
    .status.down::before { background: #ef4444; }
    button { font: inherit; padding: .4rem .6rem; }
    .charts { margin-top: 2rem; display: grid; gap: 1rem; }
    .charts[hidden] { display: none; }
    .charts iframe {
      width: 100%; height: 14rem; border: 0;
      border-radius: .5rem;
      background: color-mix(in srgb, currentColor 4%, transparent);
    }
  </style>
</head>
<body>
  <h1>Telemetry — 1 hour average</h1>

  <label>Site <select id="site"></select>
    <select id="range">
      <option value="now-6h">last 6h</option>
      <option value="now-24h">last 24h</option>
      <option value="now-7d">last 7 days</option>
    </select>
    <button id="toggle-charts" type="button">Show charts</button>
  </label>

  <div class="status" id="status">Checking…</div>

  <div class="cards">
    <div class="card">
      <div class="label">Temperature</div>
      <div class="value"><span id="temp">–</span><span class="unit"> °C</span></div>
    </div>
    <div class="card">
      <div class="label">Humidity</div>
      <div class="value"><span id="humidity">–</span><span class="unit"> %</span></div>
    </div>
    <div class="card">
      <div class="label">Pressure</div>
      <div class="value"><span id="pressure">–</span><span class="unit"> hPa</span></div>
    </div>
  </div>

  <p class="note" id="note">Loading…</p>

  <div class="charts" id="charts" hidden>
    <iframe id="chart-temp" loading="lazy" title="Temperature over time"></iframe>
    <iframe id="chart-humidity" loading="lazy" title="Humidity over time"></iframe>
    <iframe id="chart-pressure" loading="lazy" title="Pressure over time"></iframe>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const sel = $('site');
    const range = $('range');
    const charts = $('charts');
    const toggle = $('toggle-charts');

    // Grafana renders the charts; this page is the front door. Panel ids come
    // from grafana/values.yaml — keep them in sync.
    const GRAFANA = 'http://192.168.1.218';
    const PANELS = { temp: 1, humidity: 2, pressure: 3 };

    // A board that's up publishes every ~minute; allow a few missed sends before
    // calling it down so a single dropped message doesn't flip the indicator.
    const STALE_MS = 3 * 60 * 1000;

    function relTime(ms) {
      const s = Math.round(ms / 1000);
      if (s < 60) return `${s}s ago`;
      const m = Math.round(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.round(m / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.round(h / 24)}d ago`;
    }

    function setStatus(lastSeen) {
      const el = $('status');
      if (!lastSeen) {
        el.className = 'status down';
        el.textContent = 'Offline — no data in the last 24h';
        return;
      }
      const age = Date.now() - new Date(lastSeen).getTime();
      const up = age < STALE_MS;
      el.className = up ? 'status up' : 'status down';
      el.textContent = `${up ? 'Online' : 'Offline'} — last seen ${relTime(age)}`;
    }

    // Charts are opt-in: three live Grafana panels each proxy Flux queries into
    // InfluxDB on a refresh loop, so we only load their iframes once the user
    // asks, and only redraw them while they're on screen.
    function drawCharts() {
      if (charts.hidden || !sel.value) return;
      const dark = matchMedia('(prefers-color-scheme: dark)').matches;
      for (const [field, panelId] of Object.entries(PANELS)) {
        const url = new URL(`${GRAFANA}/d-solo/iot-telemetry/telemetry`);
        url.search = new URLSearchParams({
          orgId: '1',
          panelId: String(panelId),
          'var-site': sel.value,
          from: range.value,
          to: 'now',
          theme: dark ? 'dark' : 'light',
        });
        $(`chart-${field}`).src = url.toString();
      }
    }

    function fail(message) {
      $('note').className = 'note error';
      $('note').textContent = message;
    }

    async function loadSites() {
      const r = await fetch('/api/sites');
      const { sites, error } = await r.json();
      if (error) throw new Error(error);
      if (!sites.length) throw new Error('no sites reporting');
      sel.innerHTML = sites.map((s) => `<option>${s}</option>`).join('');
    }

    async function refresh() {
      if (!sel.value) return;
      try {
        const r = await fetch(`/api/summary?site=${encodeURIComponent(sel.value)}`);
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        for (const f of ['temp', 'humidity', 'pressure']) {
          $(f).textContent = d.averages[f] ?? '–';
        }
        setStatus(d.lastSeen);
        $('note').className = 'note';
        $('note').textContent = Object.keys(d.averages).length
          ? 'Updated ' + new Date().toLocaleTimeString()
          : 'No data in the last hour.';
      } catch (e) {
        fail(e.message);
      }
    }

    function clearCharts() {
      for (const field of Object.keys(PANELS)) $(`chart-${field}`).removeAttribute('src');
    }

    toggle.addEventListener('click', () => {
      charts.hidden = !charts.hidden;
      toggle.textContent = charts.hidden ? 'Show charts' : 'Hide charts';
      if (charts.hidden) clearCharts();
      else drawCharts();
    });

    // Site/range changes redraw the panels only when they're already visible.
    sel.addEventListener('change', () => { refresh(); drawCharts(); });
    range.addEventListener('change', drawCharts);
    loadSites().then(refresh).catch((e) => fail(e.message));
    setInterval(refresh, 30000);
  </script>
</body>
</html>

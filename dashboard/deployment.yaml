apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: iot
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: ghcr.io/xkogd66/iot-dashboard:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: INFLUX_URL
          value: http://influxdb.iot.svc.cluster.local:8086
        - name: INFLUX_TOKEN
          valueFrom:
            secretKeyRef:
              name: influxdb-auth
              key: admin-token
        - name: INFLUX_ORG
          valueFrom:
            secretKeyRef:
              name: influxdb-auth
              key: org
        - name: INFLUX_BUCKET
          valueFrom:
            secretKeyRef:
              name: influxdb-auth
              key: bucket
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
